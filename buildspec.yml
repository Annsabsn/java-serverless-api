version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 435756741830.dkr.ecr.ap-south-1.amazonaws.com
      - REPOSITORY_URI=435756741830.dkr.ecr.ap-south-1.amazonaws.com/java-api
      - IMAGE_TAG=v1

  build:
    commands:
      - echo Building Docker image...
      - docker build -t java-api:$IMAGE_TAG .
      - docker tag java-api:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Docker image pushed successfully